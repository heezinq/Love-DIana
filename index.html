<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Диночки</title>
    <style>
        /* Основные стили страницы */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Скрываем скролл */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Стильный градиентный фон */
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
        }

        /* Эффект плавающих фоновых кругов (для глубины) */
        .background-circles {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            animation: float 10s infinite ease-in-out;
        }

        .circle-1 { width: 300px; height: 300px; top: -100px; left: -100px; animation-delay: 0s; }
        .circle-2 { width: 200px; height: 200px; bottom: -50px; right: -50px; animation-delay: 2s; }
        .circle-3 { width: 100px; height: 100px; top: 40%; left: 70%; animation-delay: 4s; }

        /* Стили карточки извинения (Glassmorphism) */
        .apology-card {
            background: rgba(255, 255, 255, 0.25); /* Полупрозрачный фон */
            backdrop-filter: blur(15px); /* Размытие фона за карточкой */
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            text-align: center;
            max-width: 450px;
            width: 85%;
            z-index: 1;
            /* Изначально скрыта для анимации появления */
            opacity: 0;
            transform: translateY(50px) scale(0.9);
            animation: appearCard 1s forwards ease-out 0.5s; /* Появление с задержкой */
        }

        /* Анимированный смайлик/сердце */
        .icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: inline-block;
            animation: heartBeat 1.5s infinite ease-in-out;
        }

        /* Стили текста */
        h1 {
            color: #fff;
            font-size: 28px;
            margin-top: 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            opacity: 0;
            animation: fadeInText 1s forwards ease-out 1.2s;
        }

        .message {
            color: #fff;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            opacity: 0;
            animation: fadeInText 1s forwards ease-out 1.8s;
        }

        /* Кнопка-призыв (тоже с анимацией) */
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background: #fff;
            color: #ff6b6b;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeInText 1s forwards ease-out 2.5s;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.5);
        }

        /* --- КРУТЫЕ АНИМАЦИИ --- */

        /* 1. Плавное появление карточки снизу и увеличение */
        @keyframes appearCard {
            0% {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* 2. Поэтапное появление текста */
        @keyframes fadeInText {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 3. Пульсация сердца/иконки */
        @keyframes heartBeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* 4. Плавание фоновых кругов */
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-20px) translateX(10px); }
        }
    </style>
</head>
<body>

    <div class="background-circles">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <div class="apology-card">
        <div class="icon">🥺❤️</div>
        <h1>Диночка моя любимая...</h1>
        
        <p class="message">
            Ты не хочешь встретиться?<br><br>
            Вот сегодня я косячник... Я пообещал, что буду с тобой весь день, но не исполнил это. Мне очень жаль. Прости меня, пожалуйста!
        </p>
        
        <a href="#" class="btn">Давай увидимся! ✨</a>
    </div>

</body>
</html>
