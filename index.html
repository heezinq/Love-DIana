<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Дианы</title>
    <style>
        body {
            background-color: #fdf2f2; /* Нежно-розовый фон */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        h1 {
            color: #800000; /* Бордовый цвет */
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        p {
            color: #5c0000;
            font-size: 1.5rem;
        }
        .heart {
            color: #800000;
            font-size: 50px;
            animation: heartbeat 1.2s infinite;
        }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="heart">❤</div>
        <h1>Диана, я люблю тебя!</h1>
        <p>Ты самая лучшая ✨</p>
    </div>
</body>
</html>
