<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Диана, прости меня</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fff5f5 0%, #fed7e2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #4a5568;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 2px solid #feb2b2;
        }

        h1 {
            color: #e53e3e;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .heart {
            font-size: 50px;
            color: #e53e3e;
            animation: pulse 1.5s infinite;
            margin: 20px 0;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .message-box {
            background: #fff5f5;
            padding: 20px;
            border-radius: 15px;
            font-style: italic;
            border-left: 5px solid #feb2b2;
        }

        footer {
            margin-top: 30px;
            font-size: 14px;
            color: #a0aec0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart">❤️</div>
        <h1>Диана, прости...</h1>
        
        <div class="message-box">
            <p>Я знаю, что был не прав. Мне очень жаль, что я тебя расстроил. Ты замечательный человек, и я не хочу, чтобы между нами была эта ссора.</p>
        </div>

        <p>Давай забудем всё плохое и начнем с чистого листа? 🥺</p>
        
        <footer>Нажми в любое место, чтобы отправить лучи добра</footer>
    </div>

</body>
</html>
